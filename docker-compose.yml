version: '3.8'

services:
  # API Gateway Nginx
  gateway:
    image: nginx:latest
    container_name: elibrary-gateway
    ports:
      - "9090:8080"
    volumes:
      - ./gateway/nginx.conf:/etc/nginx/nginx.conf
    depends_on:
      - katalog-buku
      - peminjaman-service
      - keanggotaan-service
    networks:
      - elibrary-network

  # Service 1: Katalog Buku (Arief)
  katalog-buku:
    build:
      context: ./Services/102022400291-katalog-buku
      dockerfile: Dockerfile
    container_name: katalog-buku
    restart: unless-stopped
    expose:
      - "8000"
    volumes:
      - ./Services/102022400291-katalog-buku:/var/www/html
      - /var/www/html/vendor
    environment:
      - APP_NAME=Katalog-Buku
      - APP_ENV=local
      - APP_DEBUG=true
      - APP_KEY=base64:YCNhchFjpFVSPk0Qqf5aOpwC7sZSZiRNXxnkSuHq6t0=
      - APP_URL=http://katalog-buku:8000
      - DB_CONNECTION=sqlite
      - DB_DATABASE=/var/www/html/database/database.sqlite
    networks:
      - elibrary-network

  # Service 2: Peminjaman Buku (Rosi)
  peminjaman-service:
    build:
      context: ./Services/102022400314-peminjaman-service
      dockerfile: Dockerfile
    container_name: peminjaman-service
    restart: unless-stopped
    expose:
      - "80"
    volumes:
      - ./Services/102022400314-peminjaman-service:/var/www/html
      - /var/www/html/vendor
    environment:
      - APP_NAME=Peminjaman-Service
      - APP_ENV=local
      - APP_DEBUG=true
      - APP_KEY=base64:8qqPl17H6FPO01QaeZ1ZN7FBrGSuLzBdm2XWK0IF1B4=
      - APP_URL=http://peminjaman-service
      - DB_CONNECTION=sqlite
      - DB_DATABASE=/var/www/html/database/database.sqlite
      - IAE_API_KEY=102022400314
      - L5_SWAGGER_GENERATE_ALWAYS=true
      - KEANGGOTAAN_SERVICE_URL=http://keanggotaan-service:8000
    networks:
      - elibrary-network

  # Service 3: Keanggotaan (Veraldo)
  keanggotaan-service:
    build:
      context: ./Services/102022400180-keanggotaan-service
      dockerfile: Dockerfile
    container_name: keanggotaan-service
    restart: unless-stopped
    expose:
      - "8000"
    volumes:
      - ./Services/102022400180-keanggotaan-service:/var/www/html
      - /var/www/html/vendor
    environment:
      - APP_NAME=Keanggotaan-Service
      - APP_ENV=local
      - APP_DEBUG=true
      - APP_KEY=base64:PmzpOn71qPl6b7MgelP/w+MkD+rL+iTTiXS/lHNKxpg=
      - APP_URL=http://keanggotaan-service:8000
      - DB_CONNECTION=sqlite
      - DB_DATABASE=/var/www/html/database/database.sqlite
    command: php artisan serve --host=0.0.0.0 --port=8000
    networks:
      - elibrary-network

networks:
  elibrary-network:
    driver: bridge